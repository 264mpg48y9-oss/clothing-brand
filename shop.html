<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA WEAR | Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#111;
    position:sticky;
    top:0;
}

.logo{
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
}

nav a:hover{
    color:#ff3c78;
}

/* HERO BANNER */
.shop-hero{
    text-align:center;
    padding:60px 20px;
    background:#1a1a1a;
}

.shop-hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.shop-hero p{
    opacity:0.7;
}

/* FILTER BAR */
.filters{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:30px 0;
    flex-wrap:wrap;
}

.filters button{
    background:#222;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

.filters button:hover{
    background:#ff3c78;
}

/* PRODUCTS GRID */
.products{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding-bottom:60px;
}

.card{
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:#ff3c78;
    font-size:18px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#ff3c78;
    color:white;
    cursor:pointer;
    border-radius:5px;
    font-weight:bold;
}

button:hover{
    background:#e03167;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#000;
    opacity:0.7;
}
</style>
</head>

<body>

<header>
    <div class="logo">NOVA WEAR</div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="new.html">New</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>
</header>

<section class="shop-hero">
    <h1>Shop Collection</h1>
    <p>Explore premium streetwear made for your style</p>
</section>

<!-- FILTERS -->
<div class="filters">
    <button>All</button>
    <button>Hoodies</button>
    <button>T-Shirts</button>
    <button>Jackets</button>
    <button>Pants</button>
</div>

<!-- PRODUCTS -->
<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975693411-b9a8a4b8b6e0?w=600" alt="">
        <div class="card-content">
            <h3>Urban Hoodie</h3>
            <div class="price">$85</div>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975682031-a8d1c7f3b6c2?w=600" alt="">
        <div class="card-content">
            <h3>Minimal Tee</h3>
            <div class="price">$40</div>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975869011-6d3d2d2d2d2d?w=600" alt="">
        <div class="card-content">
            <h3>Oversized Jacket</h3>
            <div class="price">$120</div>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975859011-6d3d2d2d2d2d?w=600" alt="">
        <div class="card-content">
            <h3>Street Pants</h3>
            <div class="price">$70</div>
            <button>Add to Cart</button>
        </div>
    </div>

</section>

<footer>
    © 2026 NOVA WEAR. All rights reserved.
</footer>

</body>
</html>
