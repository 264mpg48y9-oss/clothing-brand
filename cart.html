<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA WEAR | Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    padding:20px;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

a{
    color:white;
    text-decoration:none;
}

/* CART CONTAINER */
.cart-container{
    max-width:900px;
    margin:auto;
}

.cart-item{
    display:flex;
    gap:15px;
    background:#1a1a1a;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    align-items:center;
}

.cart-item img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:8px;
}

.cart-item h3{
    margin-bottom:5px;
}

.cart-item p{
    opacity:0.7;
}

.cart-item button{
    margin-left:auto;
    background:red;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:5px;
}

/* TOTAL BOX */
.total-box{
    margin-top:20px;
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
    text-align:right;
    font-size:20px;
}

/* CHECKOUT BUTTON */
.checkout-btn{
    display:inline-block;
    margin-top:15px;
    background:#ff3c78;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.checkout-btn:hover{
    background:#e03167;
}

.empty{
    text-align:center;
    opacity:0.7;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
    <h2>NOVA WEAR 🛒</h2>
    <a href="shop.html">← Continue Shopping</a>
</header>

<div class="cart-container">

    <div id="cart-items"></div>

    <div class="total-box">
        Total: <span id="total">$0</span><br>

        <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
    </div>

</div>

<script src="js/cart.js"></script>

</body>
</html>
